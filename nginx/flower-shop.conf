# Nginx reverse proxy for the flower shop Next.js app.
# Place this in /etc/nginx/sites-available/ and symlink to sites-enabled/.
# Assumes Certbot has already written the SSL block (or use the HTTP-only block
# below during the first certbot run).

server {
    listen 80;
    server_name example.com www.example.com;

    # Let Certbot manage the ACME challenge.
    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    # Redirect everything else to HTTPS.
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2  on;
    server_name example.com www.example.com;

    # ── SSL (filled in by Certbot) ─────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff"                           always;
    add_header X-Frame-Options           "SAMEORIGIN"                        always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Upload size limit (match server-action bodySizeLimit) ─────────────
    client_max_body_size 5M;

    # ── Proxy to Next.js ──────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Static assets: long cache, no proxy overhead ──────────────────────
    location /_next/static/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host $host;
        expires            1y;
        add_header         Cache-Control "public, immutable";
        access_log         off;
    }

    # ── Uploaded images: served by Next.js, mild cache ────────────────────
    location /uploads/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host $host;
        expires            30d;
        add_header         Cache-Control "public";
        access_log         off;
    }

    # Block .env files and hidden paths
    location ~ /\. { deny all; }
}
