# Spin up only the Postgres database.
# Use this when deploying Next.js with PM2 directly on the host (not in Docker).
#
#   docker compose -f docker-compose.db.yml up -d

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flowershop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-flowershop}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flowershop}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
