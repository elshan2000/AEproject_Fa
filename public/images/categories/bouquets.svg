  <g transform="translate(470 235)"><circle r="66" fill="url(#r2)"/><circle r="22" fill="#C97E94"/></g>
  <g transform="translate(400 195)"><circle r="78" fill="url(#r1)"/><circle r="30" fill="#7A3045"/></g>
  <circle cx="300" cy="300" r="26" fill="url(#r2)"/><circle cx="505" cy="305" r="24" fill="url(#r2)"/>
