      <stop offset="0" stop-color="#FCFBF8"/><stop offset="1" stop-color="#F1E2E7"/>
    </linearGradient>
    <radialGradient id="r1" cx="0.5" cy="0.45" r="0.6"><stop offset="0" stop-color="#F3D9E0"/><stop offset="0.5" stop-color="#D98EA3"/><stop offset="1" stop-color="#AE4A63"/></radialGradient>
    <radialGradient id="r2" cx="0.5" cy="0.4" r="0.65"><stop offset="0" stop-color="#FDF6F8"/><stop offset="0.6" stop-color="#F1C7D3"/><stop offset="1" stop-color="#D98EA3"/></radialGradient>
    <linearGradient id="wrap" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F7EEF1"/><stop offset="1" stop-color="#E7CDD6"/></linearGradient>
